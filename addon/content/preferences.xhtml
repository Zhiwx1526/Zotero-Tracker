<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:html="http://www.w3.org/1999/xhtml">
<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })">
  <label>
    <html:h2 data-l10n-id="pref-title"></html:h2>
  </label>

  <!-- API Key Settings -->
  <label>
    <html:h3 data-l10n-id="pref-api-section"></html:h3>
  </label>

  <hbox>
    <html:label for="zotero-prefpane-__addonRef__-openai-key" data-l10n-id="pref-openai-key"></html:label>
    <html:input type="password" id="zotero-prefpane-__addonRef__-openai-key" preference="openaiKey"></html:input>
  </hbox>

  <hbox>
    <html:label for="zotero-prefpane-__addonRef__-claude-key" data-l10n-id="pref-claude-key"></html:label>
    <html:input type="password" id="zotero-prefpane-__addonRef__-claude-key" preference="claudeKey"></html:input>
  </hbox>

  <!-- Website Selection -->
  <label>
    <html:h3 data-l10n-id="pref-website-section"></html:h3>
  </label>

  <checkbox id="zotero-prefpane-__addonRef__-arxiv" preference="trackArxiv" data-l10n-id="pref-track-arxiv" />

  <checkbox id="zotero-prefpane-__addonRef__-pubmed" preference="trackPubmed" data-l10n-id="pref-track-pubmed" />

  <!-- Relevance Threshold -->
  <label>
    <html:h3 data-l10n-id="pref-threshold-section"></html:h3>
  </label>

  <hbox>
    <html:label for="zotero-prefpane-__addonRef__-threshold" data-l10n-id="pref-threshold"></html:label>
    <html:input type="range" id="zotero-prefpane-__addonRef__-threshold" preference="relevanceThreshold" min="0" max="1"
      step="0.05"></html:input>
    <html:span id="zotero-prefpane-__addonRef__-threshold-value">0.7</html:span>
  </hbox>

  <!-- Keyboard Shortcut -->
  <label>
    <html:h3 data-l10n-id="pref-shortcut-section"></html:h3>
  </label>

  <hbox>
    <html:label for="zotero-prefpane-__addonRef__-shortcut" data-l10n-id="pref-shortcut"></html:label>
    <html:input type="text" id="zotero-prefpane-__addonRef__-shortcut" preference="shortcutKey" placeholder="Space">
    </html:input>
  </hbox>
</groupbox>
<vbox>
  <html:label data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'></html:label>
</vbox>

</html>
